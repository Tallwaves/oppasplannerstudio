<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oppas Planner</title>
  <link rel="stylesheet" href="./style.css"></head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="logo">🌸</div>
    <h1>Oppas Planner</h1>
    <p>Log in met je Google account</p>
    <button id="login-btn">Inloggen met Google</button>
  </div>
</div>

<div id="app-screen" style="display:none;">
  <div class="header">
    <div class="header-left">
      <span class="logo-small">🌸</span>
      <div>
        <div class="app-name">Oppas Planner</div>
        <div class="app-sub">Lauren & Sarah</div>
      </div>
    </div>
    <div class="week-nav">
      <button id="prev-week" class="nav-btn">&#8592;</button>
      <span id="week-label" class="week-label"></span>
      <button id="next-week" class="nav-btn">&#8594;</button>
    </div>
    <div class="header-right">
      <span id="user-name"></span>
      <button id="logout-btn">Uitloggen</button>
    </div>
  </div>

  <div class="main">
    <div class="week-grid" id="week-grid"></div>

    <div class="swap-section">
      <div class="swap-title">🔄 Ruilverzoeken</div>
      <div id="swap-list"></div>
      <button class="add-swap-btn" onclick="openSwapModal()">+ Ruil aanvragen</button>
    </div>
  </div>
</div>

<div id="modal-overlay" style="display:none;" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div id="modal-body"></div>
  </div>
</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
